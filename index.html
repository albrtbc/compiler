<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COMPILER · Card Builder</title>
  <meta name="description" content="Card builder / deckbuilder — create cards with a frame, panels, background, value and logo." />

  <!-- Social embed (Discord, Twitter, Slack…) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="COMPILER" />
  <meta property="og:title" content="COMPILER · Card Builder" />
  <meta property="og:description" content="Design custom protocol cards and decks in your browser — no install." />
  <meta property="og:url" content="https://albrtbc.github.io/compiler/" />
  <meta property="og:image" content="https://albrtbc.github.io/compiler/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="COMPILER · Card Builder" />
  <meta name="twitter:description" content="Design custom protocol cards and decks in your browser — no install." />
  <meta name="twitter:image" content="https://albrtbc.github.io/compiler/og-image.jpg" />
  <meta name="theme-color" content="#41e0d0" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230c0e14'/><rect x='28' y='28' width='44' height='44' transform='rotate(45 50 50)' fill='%2341e0d0'/></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <h1>COMPILER</h1>
      <span class="brand-sub">card editor</span>
    </div>
    <div class="topbar-actions">
      <button id="btnExport" class="btn" type="button">↗ Share</button>
      <button id="btnSaveChanges" class="btn btn-primary" type="button" hidden>Save changes</button>
      <button id="btnAddAsNew" class="btn" type="button" hidden>＋ Save as new</button>
      <button id="btnCancelEdit" class="btn btn-ghost" type="button" hidden>✕ Cancel</button>
    </div>
  </header>

  <main class="layout">
    <!-- ============ LEFT COLUMN: EDITOR + MY DECKS ============ -->
    <div class="leftcol">
    <!-- ============ EDITOR ============ -->
    <section class="panel editor" aria-label="Card editor">

      <div class="type-toggle">
        <button id="btnKindProtocol" class="seg-btn active" type="button">Compile card</button>
        <button id="btnKindCompile" class="seg-btn" type="button">Protocol card</button>
      </div>

      <p class="edit-tip">✎ Click any text on the card to edit it directly.</p>

      <div class="field">
        <label>Logo</label>
        <div class="row">
          <label class="btn btn-file">
            Upload logo
            <input id="inLogo" type="file" accept="image/*" hidden />
          </label>
          <button id="btnClearLogo" class="btn btn-ghost" type="button" hidden>Remove</button>
          <img id="logoPreview" class="thumb-preview" alt="logo" hidden />
        </div>
        <div id="logoAdjust" class="bg-adjust" hidden>
          <div class="row">
            <span class="hint">Logo zoom</span>
            <input id="inLogoZoom" type="range" min="50" max="300" value="100" />
            <span id="logoZoomVal" class="hint">100%</span>
            <button id="btnLogoReset" class="btn btn-ghost btn-sm" type="button">Reset</button>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Card background</label>
        <label class="switch" title="By default every card shares one deck background. Turn this on (deck-wide) to give each card its own background.">
          <input id="inCustomBg" type="checkbox" />
          <span class="switch-slider"></span>
          <span class="switch-text">Different background per card</span>
        </label>
        <label class="switch" title="Apply a datamosh-style block glitch to the Protocol card's front face (its back face stays clean). Only affects the Protocol card.">
          <input id="inFrontGlitch" type="checkbox" />
          <span class="switch-slider"></span>
          <span class="switch-text">Glitch effect on front</span>
        </label>
        <div id="bgSideToggle" class="type-toggle bg-side" hidden>
          <button id="btnBgFront" class="seg-btn active" type="button">Front bg</button>
          <button id="btnBgBack" class="seg-btn" type="button">Back bg</button>
        </div>
        <div class="bg-tools">
          <label class="btn btn-file">
            Upload background
            <input id="inBg" type="file" accept="image/*" hidden />
          </label>
          <button id="btnNoBg" class="btn btn-ghost" type="button">No background</button>
        </div>
        <div class="hint mb">Pick one (your uploads appear here too):</div>
        <div id="bgGrid" class="bg-grid"></div>
        <div id="bgAdjust" class="bg-adjust" hidden>
          <div class="row">
            <span class="hint">Zoom</span>
            <input id="inBgZoom" type="range" min="25" max="500" value="100" />
            <span id="bgZoomVal" class="hint">100%</span>
            <button id="btnBgReset" class="btn btn-ghost btn-sm" type="button">Reset</button>
          </div>
        </div>
      </div>

    </section>

      <aside class="panel mydecks" aria-label="My decks">
        <div class="deck-head">
          <h2>My decks <span id="savedCount" class="count">0</span></h2>
        </div>
        <div id="savedList" class="saved-list"></div>
      </aside>
    </div>

    <!-- ============ PREVIEW ============ -->
    <section class="panel preview" aria-label="Preview">
      <div class="stage">
        <!-- Front (also the only card for the vertical "Compile card" kind) -->
        <div class="card-holder">
          <canvas id="cardCanvas" class="card-canvas" width="744" height="1039" aria-label="Card front"></canvas>
          <!-- Editable text sits directly over the card; the canvas renders the real styling. -->
          <div id="cardOverlay" class="card-overlay">
            <input id="inTitle" class="ovl" type="text" maxlength="40" placeholder="PROTOCOL" autocomplete="off" spellcheck="false" />
            <input id="inValue" class="ovl" type="text" maxlength="6" placeholder="0" autocomplete="off" inputmode="numeric" spellcheck="false" />
            <div id="inTop" class="ovl ovl-multiline" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="false"></div>
            <div id="inMid" class="ovl ovl-multiline" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="false"></div>
            <div id="inBot" class="ovl ovl-multiline" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="false"></div>
            <input id="inCTop" class="ovl" type="text" maxlength="60" placeholder="&gt; TOP LINE" autocomplete="off" spellcheck="false" />
            <input id="inCSub" class="ovl" type="text" maxlength="40" placeholder="SUBTITLE" autocomplete="off" spellcheck="false" />
            <input id="inCBot" class="ovl" type="text" maxlength="60" placeholder="BOTTOM LINE" autocomplete="off" spellcheck="false" />
            <button id="logoHotspot" class="ovl-logo" type="button" title="Click to upload a logo">
              <span class="ovl-logo-ico">＋</span>
              <span class="ovl-logo-txt">Logo</span>
            </button>
          </div>
        </div>
        <!-- Back of the landscape "Protocol card" — shown stacked below the front -->
        <div class="card-holder" id="backHolder" hidden>
          <canvas id="cardCanvasBack" class="card-canvas" width="1039" height="744" aria-label="Card back"></canvas>
          <div id="cardOverlayBack" class="card-overlay">
            <input id="inTitleBack" class="ovl" type="text" maxlength="40" placeholder="PROTOCOL" autocomplete="off" spellcheck="false" />
            <input id="inCBack" class="ovl" type="text" maxlength="60" placeholder="BACK LINE" autocomplete="off" spellcheck="false" />
            <button id="logoHotspotBack" class="ovl-logo" type="button" title="Click to upload a logo">
              <span class="ovl-logo-ico">＋</span>
              <span class="ovl-logo-txt">Logo</span>
            </button>
          </div>
        </div>
      </div>
      <p id="renderHint" class="render-hint">Loading fonts and assets…</p>
    </section>

    <!-- ============ RIGHT COLUMN: DECK ============ -->
    <div class="rightcol">
      <aside class="panel deck" aria-label="Deck">
        <div class="deck-head">
          <h2>Deck <span id="deckCount" class="count">0</span></h2>
        </div>

        <div class="deck-name-row">
          <input id="inDeckName" type="text" maxlength="50" placeholder="Untitled deck" autocomplete="off" />
        </div>
        <div class="deck-menu">
          <button id="btnDownloadAll" class="btn btn-sm" type="button">⬇ All</button>
          <button id="btnExportPDF" class="btn btn-sm" type="button" title="Print &amp; play PDF (3×3, 63×88mm, with backs)">PDF</button>
          <button id="btnExportDeck" class="btn btn-sm" type="button">Export</button>
          <label class="btn btn-sm btn-file">
            Import
            <input id="inImportDeck" type="file" accept="application/json,.json" hidden />
          </label>
          <button id="btnClearDeck" class="btn btn-sm btn-danger" type="button">Clear all</button>
        </div>

        <div id="deckEmpty" class="deck-empty">
          No cards yet.<br />Use the <b>＋ New card</b> tile to add one.
        </div>
        <div id="deckList" class="deck-list"></div>
      </aside>
    </div>
  </main>

  <div id="shareView" class="share-view" hidden>
    <div class="share-view-head">
      <div class="share-view-title">
        <span class="brand-mark">◆</span>
        <h2 id="shareViewTitle">Shared deck</h2>
        <span id="shareViewCount" class="count">0</span>
      </div>
      <div class="share-view-actions">
        <button id="shareImport" class="btn btn-primary" type="button">⬇ Import to my editor</button>
        <button id="shareClose" class="btn btn-ghost" type="button">Close</button>
      </div>
    </div>
    <div id="shareGrid" class="share-grid"></div>
  </div>

  <div id="modalOverlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h3 id="modalTitle">Delete card?</h3>
      <p id="modalBody" class="modal-body"></p>
      <input id="modalInput" class="modal-input" type="text" hidden />
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-ghost" type="button">Cancel</button>
        <button id="modalConfirm" class="btn btn-danger" type="button">Delete</button>
      </div>
    </div>
  </div>

  <!-- Floating formatting toolbar shown above a text selection inside a panel -->
  <div id="selToolbar" class="sel-toolbar" hidden>
    <button type="button" class="rt-btn" data-mark="**" title="Bold"><b>B</b></button>
    <button type="button" class="rt-btn" data-mark="__" title="Underline"><u>U</u></button>
  </div>

  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
